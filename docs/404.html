<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Agentic Chat</title>
  <style>
    :root { --bg: #0d1117; --text: #e6edf3; --accent: #58a6ff; --muted: #8b949e; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 2rem; }
    h1 { font-size: 5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; }
    a { color: var(--accent); text-decoration: none; padding: 0.5rem 1.5rem; border: 1px solid var(--accent); border-radius: 6px; display: inline-block; transition: 0.2s; }
    a:hover { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="./">Back to Documentation</a>
  </div>
</body>
</html>
