name: "CodeQL Configuration"
paths-ignore:
  - "**/*.md"
  - "**/*.txt"
  - "**/test/**"
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/node_modules/**"

query-filters:
  - exclude:
      id: js/unused-local-variable
  - exclude:
      id: js/trivial-conditional

queries:
  - uses: security-extended
  - uses: security-and-quality
