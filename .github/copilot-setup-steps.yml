# Copilot Coding Agent Setup Steps
# Installs dependencies and builds the project so Copilot agents
# (Claude, Codex) can work on issues and PRs autonomously.

name: "Copilot Setup Steps"

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          echo "No build step needed — vanilla JS project"

      - name: Run tests
        run: npx jest --verbose --ci

      - name: Lint check
        run: npx eslint app.js --no-eslintrc --rule '{"no-unused-vars":"warn","no-undef":"warn","no-eval":"error","no-implied-eval":"error"}' --env browser --env es2022 || true
